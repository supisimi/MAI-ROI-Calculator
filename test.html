<!DOCTYPE html>
<html>
<head>
  <title>Test Products</title>
</head>
<body>
  <h1>Product Test</h1>
  <div id="output"></div>
  
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const output = document.getElementById('output');
      output.innerHTML = `
        <h2>State Check</h2>
        <p>State exists: ${typeof state !== 'undefined'}</p>
        <p>Products array exists: ${state && Array.isArray(state.products)}</p>
        <p>Number of products: ${state && state.products ? state.products.length : 0}</p>
        <h3>Products:</h3>
        <pre>${state && state.products ? JSON.stringify(state.products, null, 2) : 'No products'}</pre>
      `;
    });
  </script>
</body>
</html>
